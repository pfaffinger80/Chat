<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Server Chat (MQTT)</title>
    <style>
        /* Das exakt gleiche Design wie vorher */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #ece5dd; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: white; width: 100%; max-width: 450px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); overflow: hidden; display: flex; flex-direction: column; height: 600px; }
        #login-screen { padding: 40px 20px; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100%; }
        #login-screen h2 { color: #333; margin-bottom: 20px; }
        #username { padding: 12px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 15px; outline: none; }
        button { padding: 12px; font-size: 16px; background-color: #25D366; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #1ebe57; }
        #chat-screen { display: none; flex-direction: column; height: 100%; }
        .chat-header { background-color: #075E54; color: white; padding: 15px 20px; font-size: 18px; font-weight: bold; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; background-color: #e5ddd5; display: flex; flex-direction: column; }
        .message { max-width: 75%; padding: 10px 15px; border-radius: 15px; margin-bottom: 10px; line-height: 1.4; word-wrap: break-word; }
        .message.own { background-color: #dcf8c6; align-self: flex-end; border-bottom-right-radius: 0; }
        .message.other { background-color: #ffffff; align-self: flex-start; border-bottom-left-radius: 0; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .message-sender { font-size: 12px; color: #888; margin-bottom: 4px; font-weight: bold; }
        .input-group { display: flex; padding: 10px; background-color: #f0f0f0; }
        #message-input { flex: 1; padding: 12px; border: none; border-radius: 20px; margin-right: 10px; font-size: 15px; outline: none; }
    </style>
    
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body>

    <div class="container">
        <div id="login-screen">
            <h2>Public Server Chat</h2>
            <input type="text" id="username" placeholder="Dein Name..." autocomplete="off">
            <button onclick="joinChat()">Chat betreten</button>
        </div>

        <div id="chat-screen">
            <div class="chat-header" id="chat-header">Chat</div>
            <div class="chat-box" id="chat-box"></div>
            <div class="input-group">
                <input type="text" id="message-input" placeholder="Nachricht..." autocomplete="off">
                <button onclick="sendMessage()">Senden</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = "";
        
        // 1. Verbinde mit dem offenen, kostenlosen MQTT-Server über Websockets
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        
        // 2. Erfinde einen einzigartigen Raumnamen (damit dir keine Fremden dazwischenfunken)
        // Ändere diesen Namen am besten in etwas Geheimes!
        const chatRoom = "mein-geheimer-github-chat-xyz-8923"; 

        client.on('connect', function () {
            console.log("Verbunden mit öffentlichem Server!");
            // Wir "abonnieren" unseren geheimen Raum
            client.subscribe(chatRoom);
        });

        // 3. Wenn eine Nachricht auf dem Server ankommt
        client.on('message', function (topic, message) {
            // Die Nachricht kommt als Text an und wird in ein Objekt umgewandelt
            const data = JSON.parse(message.toString());
            
            // Prüfen, ob die Nachricht von uns selbst oder jemand anderem ist
            const type = (data.user === currentUser) ? 'own' : 'other';
            addMessage(data.user, data.text, type);
        });

        // Login und Senden Funktionen
        document.getElementById('username').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') joinChat();
        });

        document.getElementById('message-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });

        function joinChat() {
            const nameInput = document.getElementById('username').value.trim();
            if (nameInput !== "") {
                currentUser = nameInput;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                document.getElementById('chat-header').innerText = `Eingeloggt als: ${currentUser}`;
                document.getElementById('message-input').focus();
            }
        }

        function sendMessage() {
            const messageInput = document.getElementById('message-input');
            const text = messageInput.value.trim();
            
            if (text !== "") {
                const messageData = {
                    user: currentUser,
                    text: text
                };
                
                // Wir senden das Datenpaket an den öffentlichen Server in unseren Raum
                client.publish(chatRoom, JSON.stringify(messageData));
                messageInput.value = '';
            }
            messageInput.focus();
        }

        function addMessage(sender, text, type) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            
            if (type === 'other') {
                msgDiv.innerHTML = `<div class="message-sender">${sender}</div>${text}`;
            } else {
                msgDiv.innerText = text;
            }
            
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
