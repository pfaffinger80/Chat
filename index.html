<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GitHub Chat (Persistent)</title>
    <style>
        body { font-family: '-apple-system', 'Segoe UI', sans-serif; background-color: #ece5dd; display: flex; justify-content: center; align-items: center; height: 100dvh; margin: 0; overflow: hidden; }
        .container { background-color: white; width: 100%; max-width: 800px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); overflow: hidden; display: flex; flex-direction: column; height: 600px; }
        
        #login-screen { padding: 40px 20px; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; }
        #username { padding: 12px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 15px; width: 100%; max-width: 300px; outline: none; }
        
        button { padding: 12px 24px; font-size: 16px; background-color: #25D366; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; -webkit-appearance: none; }
        .btn-logout { background-color: #ff5f5f; padding: 5px 10px; font-size: 12px; margin-left: 10px; }

        #chat-screen { display: none; flex-direction: row; height: 100%; width: 100%; }
        
        .sidebar { width: 250px; background-color: #f0f0f0; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { background-color: #075E54; color: white; padding: 15px; font-size: 16px; font-weight: bold; }
        .user-list { padding: 15px; overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }
        
        .user-item { padding: 8px 0; font-size: 15px; color: #333; display: flex; align-items: center; font-weight: 500; border-bottom: 1px solid #e0e0e0; }
        .user-item::before { content: ''; display: inline-block; width: 10px; height: 10px; background-color: #25D366; border-radius: 50%; margin-right: 10px; }
        .user-item.is-me { color: #075E54; font-weight: bold; }

        .main-chat { flex: 1; display: flex; flex-direction: column; height: 100%; }
        .chat-header { background-color: #075E54; color: white; padding: 15px 20px; font-size: 18px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; background-color: #e5ddd5; display: flex; flex-direction: column; -webkit-overflow-scrolling: touch; }
        .message { max-width: 80%; padding: 10px 15px; border-radius: 15px; margin-bottom: 10px; line-height: 1.4; word-wrap: break-word; font-size: 15px; }
        .message.own { background-color: #dcf8c6; align-self: flex-end; border-bottom-right-radius: 0; }
        .message.other { background-color: #ffffff; align-self: flex-start; border-bottom-left-radius: 0; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .message-sender { font-size: 12px; color: #888; margin-bottom: 4px; font-weight: bold; }

        .input-group { display: flex; padding: 10px; background-color: #f0f0f0; padding-bottom: env(safe-area-inset-bottom, 10px); }
        #message-input { flex: 1; padding: 12px; border: none; border-radius: 20px; margin-right: 10px; font-size: 16px; outline: none; }

        @media (max-width: 768px) {
            .container { max-width: 100%; height: 100dvh; border-radius: 0; }
            #chat-screen { flex-direction: column; }
            .sidebar { width: 100%; height: 80px; min-height: 80px; border-right: none; border-bottom: 1px solid #ccc; flex: none; }
            .user-list { display: flex; overflow-x: auto; white-space: nowrap; align-items: center; }
            .user-item { border-bottom: none; margin-right: 15px; }
        }
    </style>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body>

    <div class="container">
        <div id="login-screen">
            <h2>GitHub Chat</h2>
            <input type="text" id="username" placeholder="Dein Name..." autocomplete="off">
            <button onclick="joinChat()">Chat betreten</button>
        </div>

        <div id="chat-screen">
            <div class="sidebar">
                <div class="sidebar-header">👥 Online</div>
                <div class="user-list" id="user-list"></div>
            </div>

            <div class="main-chat">
                <div class="chat-header">
                    <span id="display-name">Chat</span>
                    <button class="btn-logout" onclick="logout()">Logout</button>
                </div>
                <div class="chat-box" id="chat-box"></div>
                <div class="input-group">
                    <input type="text" id="message-input" placeholder="Nachricht..." autocomplete="off">
                    <button onclick="sendMessage()">Senden</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = "";
        let onlineUsers = new Set();
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        const chatRoom = "mein-geheimer-github-chat-xyz-8923";

        client.on('connect', () => client.subscribe(chatRoom));

        client.on('message', (topic, message) => {
            const data = JSON.parse(message.toString());
            if (data.type === 'system') {
                if (data.action === 'join') {
                    onlineUsers.add(data.user);
                    updateUserList();
                    if (data.user !== currentUser) client.publish(chatRoom, JSON.stringify({ type: 'system', action: 'present', user: currentUser }));
                } else if (data.action === 'present') {
                    onlineUsers.add(data.user);
                    updateUserList();
                } else if (data.action === 'leave') {
                    onlineUsers.delete(data.user);
                    updateUserList();
                }
            } else {
                addMessage(data.user, data.text, data.user === currentUser ? 'own' : 'other');
                onlineUsers.add(data.user);
                updateUserList();
            }
        });

        function joinChat(storedName = null) {
            const nameInput = storedName || document.getElementById('username').value.trim();
            if (nameInput !== "") {
                currentUser = nameInput;
                localStorage.setItem('chat_user', currentUser); // NAME SPEICHERN
                
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                document.getElementById('display-name').innerText = currentUser;
                
                onlineUsers.add(currentUser);
                updateUserList();
                client.publish(chatRoom, JSON.stringify({ type: 'system', action: 'join', user: currentUser }));
                document.getElementById('message-input').focus();
            }
        }

        function logout() {
            client.publish(chatRoom, JSON.stringify({ type: 'system', action: 'leave', user: currentUser }));
            localStorage.removeItem('chat_user'); // SPEICHER LÖSCHEN
            location.reload(); // Seite neu laden
        }

        // PRÜFEN OB NAME GESPEICHERT IST BEIM START
        window.onload = () => {
            const savedName = localStorage.getItem('chat_user');
            if (savedName) {
                // Ein kleiner Timeout hilft, damit MQTT Zeit zum Verbinden hat
                setTimeout(() => joinChat(savedName), 500);
            }
        };

        function sendMessage() {
            const input = document.getElementById('message-input');
            if (input.value.trim() !== "") {
                client.publish(chatRoom, JSON.stringify({ type: 'chat', user: currentUser, text: input.value.trim() }));
                input.value = '';
            }
            input.focus();
        }

        function updateUserList() {
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            onlineUsers.forEach(user => {
                const div = document.createElement('div');
                div.className = 'user-item' + (user === currentUser ? ' is-me' : '');
                div.innerText = user + (user === currentUser ? ' (Du)' : '');
                list.appendChild(div);
            });
        }

        function addMessage(sender, text, type) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = type === 'other' ? `<div class="message-sender">${sender}</div>${text}` : text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        window.onbeforeunload = () => {
            if (currentUser) client.publish(chatRoom, JSON.stringify({ type: 'system', action: 'leave', user: currentUser }));
        };

        document.getElementById('username').onkeypress = (e) => { if(e.key === 'Enter') joinChat(); };
        document.getElementById('message-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
